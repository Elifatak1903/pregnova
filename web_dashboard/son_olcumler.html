<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Son Ölçümler</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/son_olcumler.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <div class="main">

        <div class="top-bar header-bar">

            <h1 class="page-title" data-i18n="recentMeasurements">Son Ölçümler</h1>

            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge"></span>

                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList" class="notif-list"></div>

                    <div class="notif-footer" onclick="go('notifications.html')" data-i18n="viewAll">
                        Tümünü Gör →
                    </div>
                </div>
            </div>

        </div>

        <select id="dateFilter" class="date-filter"></select>

        <div id="measurementsList"></div>

    </div>

</div>

<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h3 id="popupName"></h3>
        <div id="popupData"></div>
        <button class="popup-btn" onclick="closePopup()" data-i18n="close">Kapat</button>
    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="son_olcumler.js"></script>

</body>
</html>
