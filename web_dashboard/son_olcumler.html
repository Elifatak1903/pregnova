<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Son Ölçümler</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/son_olcumler.css">
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('gynecologist.html')"><span>🏠</span> Dashboard</li>
            <li onclick="go('patients.html')"><span>👩‍⚕️</span> Danışanlar</li>
            <li onclick="go('requests_gynecologist.html')"><span>📥</span> İstekler</li>

        </ul>
    </div>

    <div class="main">

        <div class="top-bar header-bar">

            <h1 class="page-title">Son Ölçümler</h1>

            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge">3</span>

                <div class="notif-dropdown hidden">
                    <div class="notif-list"></div>

                    <div class="notif-footer" onclick="go('notifications.html')">
                        Tümünü Gör →
                    </div>
                </div>
            </div>

        </div>

        <div id="measurementsList"></div>

    </div>

</div>

<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h3 id="popupName"></h3>
        <div id="popupData"></div>
        <button class="popup-btn" onclick="closePopup()">Kapat</button>
    </div>
</div>

<script type="module" src="son_olcumler.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
