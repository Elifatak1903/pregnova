<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PregNova</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/account_gynecologist.css">
</head>
<body class="gynecologist">
<div class="container">
    <div class="sidebar"></div>
    <div class="main">
        <div class="top-bar">
            <h1 class="page-title" data-i18n="account">Hesabım</h1>
            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge"></span>
                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList" class="notif-list"></div>
                    <div class="notif-footer" onclick="go('notifications.html')" data-i18n="viewAll">
                        Tümünü Gör →
                    </div>
                </div>
            </div>
        </div>
        <div class="account-page">
            <div class="profile-card">
                <div class="avatar">👤</div>
                <div>
                    <h2 id="name" data-i18n="loading">Yükleniyor...</h2>
                    <p id="email"></p>
                    <span class="role" data-i18n="gynecologist">Jinekolog</span>
                </div>
            </div>
            <button class="edit-btn" onclick="go('edit_gynecologist_profile.html')" data-i18n="editInfo">
                Düzenle
            </button>
            <h3 data-i18n="expertiseInfo">Uzmanlık Bilgileri</h3>
            <div class="info-card">
                <span data-i18n="licenseNo">Lisans No</span>
                <b id="license"></b>
            </div>
            <div class="info-card">
                <span data-i18n="experience">Deneyim</span>
                <b id="experience"></b>
            </div>
            <div class="info-card">
                <span data-i18n="hospital">Hastane</span>
                <b id="hospital"></b>
            </div>
            <div class="setting-item" onclick="openDiploma()">
                📄 <span data-i18n="diplomaDocuments">Diploma / Belgeler</span>
                <span id="diplomaStatus" class="status-text" data-i18n="none">Yok</span>
            </div>
            <div class="settings">
                <div class="setting-item" onclick="go('change_password.html')">
                    🔒 <span data-i18n="changePassword">Şifre Değiştir</span>
                </div>
                <div class="setting-item logout" onclick="logout()">
                    🚪 <span data-i18n="logoutAction">Çıkış Yap</span>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module">
    import { auth, db } from "./app.js";
    import { t } from "./i18n.js";
    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) return location.href = "login.html";

      const snap = await getDoc(doc(db, "users", user.uid));
      const data = snap.data();

      document.getElementById("name").innerText =
        "Dr. " + (data?.name || "") + " " + (data?.surname || "");
      document.getElementById("email").innerText = user.email;
      document.getElementById("license").innerText = data?.licenseNumber || "-";
      document.getElementById("experience").innerText = data?.experience || "-";
      document.getElementById("hospital").innerText = data?.hospital || "-";

      const diplomaUrl = data?.diplomaUrl || data?.diploma || null;
      window.diplomaUrl = diplomaUrl;
      document.getElementById("diplomaStatus").innerText =
        diplomaUrl ? t("diplomaUploaded") : t("none");
    });

    window.logout = async function () {
      await signOut(auth);
      location.href = "login.html";
    };

    window.go = function(page) {
      window.location.href = page;
    };

    window.openDiploma = function() {
      if (!window.diplomaUrl) {
        alert(t("noDiploma"));
        return;
      }

      window.open(window.diplomaUrl, "_blank");
    };
</script>
<script type="module" src="app.js"></script>
</body>
</html>
