<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Jinekolog Paneli</title>

    <!-- ROLE -->
    <script>
        const role = localStorage.getItem("role");
        if (role) {
          document.documentElement.className = role;
        }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/gynecologist.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">

            <h1 class="page-title" data-i18n="gynecologistPanel">Jinekolog Paneli</h1>

            <!-- NOTIFICATION -->
            <div class="notification-btn" onclick="toggleNotifications(event)">
                <span class="notification-mark" aria-hidden="true"></span>
                <span class="badge"></span>
                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList" class="notif-list"></div>

                    <div class="notif-footer" onclick="openNotificationsPage(event)" data-i18n="viewAll">
                        Tümünü Gör →
                    </div>
                </div>
            </div>

        </div>

        <!-- CARDS -->
        <div class="cards">

            <div class="card stat-card" onclick="go('patients.html')">
                <div class="card-top">
                    <p data-i18n="totalPatients">Toplam Hasta</p>
                    <div class="icon purple">P</div>
                </div>
                <span id="approved">0</span>
            </div>

            <div class="card stat-card" onclick="go('requests_gynecologist.html')">
                <div class="card-top">
                    <p data-i18n="pendingRequest">Bekleyen İstek</p>
                    <div class="icon orange">⏳</div>
                </div>
                <span id="pending">0</span>
            </div>

            <div class="card stat-card">
                <div class="card-top">
                    <p data-i18n="highRisk">Yüksek Risk</p>
                    <div class="icon red">!</div>
                </div>
                <span id="highRisk">0</span>
            </div>

            <div class="card stat-card" onclick="go('son_olcumler.html')">
                <div class="card-top">
                    <p data-i18n="last7Days">Son 7 Gün</p>
                    <div class="icon green">G</div>
                </div>
                <span id="weekly">0</span>
            </div>

        </div>

        <div id="highRiskBanner" class="high-risk-banner hidden" onclick="go('son_olcumler.html')">
            <div class="risk-icon">!</div>
            <div class="risk-copy">
                <h3 data-i18n="highRiskPatientWarning">Yüksek riskli hasta uyarısı</h3>
                <p id="highRiskBannerText">0 hastada yüksek risk tespit edildi.</p>
            </div>
            <button type="button" data-i18n="inspect">İncele</button>
        </div>

        <div class="dashboard-row">

            <!-- SOL -->
            <div class="dashboard-box">
                <h3 data-i18n="recentActivities">Son Aktiviteler</h3>

                <div id="activity"></div>

                <div class="view-all">
                    <button onclick="go('son_olcumler.html')">
                        <span data-i18n="viewAll">Tümünü Gör →</span>
                    </button>
                </div>
            </div>

            <!-- SAĞ -->
            <div class="dashboard-box chart-dashboard-box">
                <h3 data-i18n="riskDistribution">Risk Dağılımı</h3>
                <canvas id="chart"></canvas>
                <div id="riskLegend"></div>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>
<script type="module" src="gynecologist.js"></script>

</body>
</html>
