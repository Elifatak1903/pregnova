<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Jinekolog Paneli</title>
    <script>
        const role = localStorage.getItem("role");
        if (role) {
          document.documentElement.className = role;
        }
    </script>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/gynecologist.css">
</head>

<body>

<div class="container">

    <!-- 🔥 SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>
        <ul>
            <li class="active">
                <span>🏠</span> Dashboard
            </li>

            <li onclick="go('patients.html')">
                <span>👩‍⚕️</span> Danışanlar
            </li>

            <li onclick="go('requests_gynecologist.html')">
                <span>📥</span> İstekler
            </li>

            <li onclick="go('messages_gynecologist.html')">
                <span>💬</span> Mesajlar
            </li>

            <li onclick="go('account_gynecologist.html')">
                <span>👤</span> Hesabım
            </li>

            <li onclick="logout()">
                <span>🚪</span> Çıkış
            </li>
        </ul>
    </div>

    <!-- 🔥 MAIN -->
    <div class="main">

        <div class="top-bar">

            <h1 class="page-title">Jinekolog Paneli</h1>

            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge">3</span>

                <div class="notif-dropdown hidden">
                    <div class="notif-list">
                        <div class="notif-item">Yeni ölçüm geldi</div>
                        <div class="notif-item">Mesaj aldınız</div>
                    </div>
                    <div class="notif-footer" onclick="go('notifications.html')">
                        Tümünü Gör →
                    </div>
                </div>
            </div>
        </div>

        <!-- 🔥 STAT CARDS -->
        <div class="cards">

            <div class="card stat-card" onclick="go('patients.html')">
                <div class="card-top">
                    <p>Toplam Hasta</p>
                    <div class="icon purple">👤</div>
                </div>
                <span id="approved">0</span>
            </div>

            <div class="card stat-card" onclick="go('requests_gynecologist.html')">
                <div class="card-top">
                    <p>Bekleyen İstek</p>
                    <div class="icon orange">⏳</div>
                </div>
                <span id="pending">0</span>
            </div>

            <div class="card stat-card">
                <div class="card-top">
                    <p>Yüksek Risk</p>
                    <div class="icon red">⚠️</div>
                </div>
                <span id="highRisk">0</span>
            </div>

            <div class="card stat-card" onclick="go('son_olcumler.html')">
                <div class="card-top">
                    <p>Son 7 Gün</p>
                    <div class="icon green">📈</div>
                </div>
                <span id="weekly">0</span>
            </div>

        </div>

        <div class="dashboard-row">

            <!-- 🔥 SOL -->
            <div class="dashboard-box">
                <h3>Son Aktiviteler</h3>

                <div id="activity"></div>

                <div class="view-all">
                    <button onclick="go('son_olcumler.html')">
                        Tümünü Gör →
                    </button>
                </div>
            </div>

            <!-- 🔥 SAĞ -->
            <div class="dashboard-box chart-dashboard-box">
                <h3>Risk Dağılımı</h3>
                <canvas id="chart"></canvas>
                <div id="riskLegend"></div>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      Timestamp,
      orderBy,
      limit,
      getDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    /* 🔥 FIREBASE INIT */
    const app = initializeApp({
      apiKey: "AIzaSyBHVmFtmXLe6BcN620XCmjv9vMOkcjeFdM",
      authDomain: "pregnova-38391.firebaseapp.com",
      projectId: "pregnova-38391"
    });

    const db = getFirestore(app);
    const auth = getAuth(app);

    /* 🔥 AUTH */
    onAuthStateChanged(auth, async (user) => {

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const uid = user.uid;

      await loadDashboard(uid);
      await loadActivity();
      await loadChart();
    });

    /* ========================= */
    /* 🔥 DASHBOARD */
    /* ========================= */
    async function loadDashboard(uid) {

      const approvedSnap = await getDocs(query(
        collection(db,"expert_requests"),
        where("expertId","==", uid),
        where("status","==","approved")
      ));

      document.getElementById("approved").innerText = approvedSnap.size;

      const pendingSnap = await getDocs(query(
        collection(db,"expert_requests"),
        where("expertId","==", uid),
        where("status","==","pending")
      ));

      document.getElementById("pending").innerText = pendingSnap.size;

      const riskSnap = await getDocs(query(
        collection(db,"risk_olcumleri"),
        where("preeklampsiRisk","==","HIGH")
      ));

      const unique = new Set();

      riskSnap.forEach(d => {
        const data = d.data();
        if (data.uid) unique.add(data.uid);
      });

      document.getElementById("highRisk").innerText = unique.size;

      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

      const weeklySnap = await getDocs(query(
        collection(db,"risk_olcumleri"),
        where("tarih", ">=", Timestamp.fromDate(sevenDaysAgo))
      ));

      document.getElementById("weekly").innerText =
        weeklySnap.size + " ölçüm";
    }

    /* ========================= */
    /* 🔥 AKTİVİTE */
    /* ========================= */
    async function loadActivity() {

      const container = document.getElementById("activity");

      const snapshot = await getDocs(
        query(
          collection(db, "risk_olcumleri"),
          orderBy("tarih", "desc"),
          limit(5)
        )
      );

      container.innerHTML = "";

      if (snapshot.empty) {
        container.innerHTML = "Henüz veri yok";
        return;
      }

      for (const item of snapshot.docs) {

        const data = item.data();
        const uid = data.uid;

        let name = "Hasta";

        if (uid) {
          const userRef = doc(db, "users", uid);
          const userDoc = await getDoc(userRef);

          const user = userDoc.data();
          name = user?.name || "Hasta";
        }

        const div = document.createElement("div");
        div.className = "activity-item";

        div.innerHTML = `
          <b>${name}</b> yeni ölçüm gönderdi
          <br>
          <span class="time">${timeAgo(data.tarih)}</span>
        `;

        container.appendChild(div);
      }
    }

    /* ========================= */
    /* 🔥 CHART */
    /* ========================= */
    async function loadChart() {

      const normal = await getDocs(query(
        collection(db,"users"),
        where("riskLevel","==","normal")
      ));

      const medium = await getDocs(query(
        collection(db,"users"),
        where("riskLevel","==","medium")
      ));

      const high = await getDocs(query(
        collection(db,"users"),
        where("riskLevel","==","high")
      ));

      const ctx = document.getElementById("chart");

      new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: ["Normal", "Orta", "Yüksek"],
          datasets: [{
            data: [normal.size, medium.size, high.size],
            backgroundColor: ["#00BFA5", "#FFA000", "#EF5350"]
          }]
        },
        options: {
          responsive: false,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom'
            }
          }
        }
      });
      createLegend(normal.size, medium.size, high.size);
    }

    function createLegend(normalCount, mediumCount, highCount) {

      const legend = document.getElementById("riskLegend");

      legend.innerHTML = `
        <div class="legend-item">
          <div class="legend-left">
            <div class="legend-color" style="background:#00BFA5"></div>
            Normal
          </div>
          <b>${normalCount}</b>
        </div>

        <div class="legend-item">
          <div class="legend-left">
            <div class="legend-color" style="background:#FFA000"></div>
            Orta
          </div>
          <b>${mediumCount}</b>
        </div>

        <div class="legend-item">
          <div class="legend-left">
            <div class="legend-color" style="background:#EF5350"></div>
            Yüksek
          </div>
          <b>${highCount}</b>
        </div>
      `;
    }

    /* ========================= */
    /* 🔥 TIME */
    /* ========================= */
    function timeAgo(timestamp) {

      if (!timestamp) return "-";

      const now = new Date();
      const date = timestamp.toDate();

      const diff = Math.floor((now - date) / 1000);

      if (diff < 60) return diff + " sn önce";
      if (diff < 3600) return Math.floor(diff/60) + " dk önce";
      if (diff < 86400) return Math.floor(diff/3600) + " saat önce";

      return Math.floor(diff/86400) + " gün önce";
    }
</script>

<script type="module" src="app.js"></script>


</body>
</html>
