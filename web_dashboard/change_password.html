<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şifre Değiştir</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/change_password.css">
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('pregnant.html')"><span>🏠</span> Ana Sayfa</li>
            <li onclick="go('messages_pregnant.html')"><span>💬</span> Mesajlar</li>
            <li onclick="go('expert_search.html')"><span>🔍</span> Uzman Ara</li>
            <li onclick=go('account_pregnant.html')>👤 Hesabım</li>
            <li onclick="logout()"><span>🚪</span> Çıkış</li>
        </ul>
    </div>

    <div class="main">

        <h1 class="page-title">Şifre Değiştir</h1>

        <div class="form">

            <div class="input-group">
                <label>Mevcut Şifre</label>
                <input type="password" id="currentPassword">
            </div>

            <div class="input-group">
                <label>Yeni Şifre</label>
                <input type="password" id="newPassword">
            </div>

            <div class="input-group">
                <label>Yeni Şifre (Tekrar)</label>
                <input type="password" id="confirmPassword">
            </div>

            <button onclick="changePassword()" class="save-btn">
                🔒 Şifreyi Güncelle
            </button>

        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="change_password.js"></script>

</body>
</html>
