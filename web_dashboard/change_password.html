<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PregNova</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/change_password.css">
</head>
<body>
<div class="container">
    <div class="sidebar"></div>
    <div class="main">

        <div class="top-bar">
            <h1 class="page-title" data-i18n="changePassword">Şifre Değiştir</h1>
        </div>

        <div class="password-layout">

            <div class="security-card">
                <div class="security-icon">L</div>
                <h2 data-i18n="accountSecurity">Hesap Güvenliği</h2>
                <p data-i18n="passwordSecurityText">
                    Şifreni düzenli olarak güncellemek hesabının güvenliği için önemlidir.
                </p>
            </div>

            <div class="form">
                <div class="input-group">
                    <label data-i18n="currentPassword">Mevcut Şifre</label>
                    <input type="password" id="currentPassword">
                </div>

                <div class="input-group">
                    <label data-i18n="newPassword">Yeni Şifre</label>
                    <input type="password" id="newPassword">
                </div>

                <div class="input-group">
                    <label data-i18n="confirmNewPassword">Yeni Şifre (Tekrar)</label>
                    <input type="password" id="confirmPassword">
                </div>

                <button onclick="changePassword()" class="save-btn">
                    <span class="plain-icon">LOCK</span> <span data-i18n="updatePassword">Şifreyi Güncelle</span>
                </button>
            </div>

        </div>

    </div>
</div>
<script type="module" src="app.js"></script>
<script type="module" src="change_password.js"></script>
</body>
</html>
