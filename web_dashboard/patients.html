<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Danışanlar</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/patients.css">
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('gynecologist.html')">
                <span>🏠</span> Dashboard
            </li>

            <li class="active">
                <span>👩‍⚕️</span> Danışanlar
            </li>

            <li onclick="go('requests_gynecologist.html')">
                <span>📥</span> İstekler
            </li>

            <li onclick="go('messages_gynecologist.html')">
                <span>💬</span> Mesajlar
            </li>

            <li onclick="go('account_gynecologist.html')">
                <span>👤</span> Hesabım
            </li>

            <li onclick="logout()">
                <span>🚪</span> Çıkış
            </li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar header-bar">

            <h1 class="page-title">Danışanlar</h1>

            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge">3</span>

                <div class="notif-dropdown hidden">
                    <div class="notif-list"></div>

                    <div class="notif-footer" onclick="go('notifications.html')">
                        Tümünü Gör →
                    </div>
                </div>
            </div>

        </div>

        <div class="patients-layout">

            <!-- SOL -->
            <div class="patient-list">

                <!-- 🔍 TOP BAR BURAYA -->
                <div class="top-bar">

                    <div class="search-box">
                        <label>Ara</label>
                        <input type="text" id="searchInput" placeholder="Hasta ara...">
                    </div>

                    <div class="filter-box">
                        <label>Filtrele</label>
                        <select id="filterSelect">
                            <option value="default">Varsayılan</option>
                            <option value="riskHigh">Yüksek Risk</option>
                            <option value="riskLow">Düşük Risk</option>
                            <option value="newest">En Yeni</option>
                            <option value="oldest">En Eski</option>
                        </select>
                    </div>

                </div>
                <div id="list"></div>

            </div>

            <!-- SAĞ -->
            <div class="summary-box">
                <h3>Genel Durum</h3>

                <p>Toplam Hasta: <b id="totalCount">0</b></p>
                <p>Yüksek Risk: <b id="highCount">0</b></p>
                <p>Orta Risk: <b id="mediumCount">0</b></p>
                <p>Normal: <b id="normalCount">0</b></p>
            </div>

        </div>

    </div>
</div>

<script type="module" src="patients.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
