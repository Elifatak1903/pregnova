<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Danışanlar</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/patients.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar header-bar">

            <h1 class="page-title" data-i18n="clients">Danışanlar</h1>

        </div>

        <div class="patients-layout">

            <!-- SOL -->
            <div class="patient-list">

                <!-- TOP BAR -->
                <div class="top-bar">

                    <div class="search-box">
                        <label data-i18n="search">Ara</label>
                        <input type="text" id="searchInput" data-i18n-placeholder="searchPatientPlaceholder" placeholder="Hasta ara...">
                    </div>

                    <div class="filter-box">
                        <label data-i18n="filter">Filtrele</label>
                        <select id="filterSelect">
                            <option value="default" data-i18n="default">Varsayılan</option>
                            <option value="riskHigh" data-i18n="highRisk">Yüksek Risk</option>
                            <option value="riskLow" data-i18n="lowRisk">Düşük Risk</option>
                            <option value="riskMedium" data-i18n="mediumRisk">Orta Risk</option>
                            <option value="doctorPreeclampsia" data-i18n="preeclampsiaFollowUp">Preeklampsi Takibi</option>
                            <option value="doctorDiabetes" data-i18n="diabetesFollowUp">Gestasyonel Diyabet Takibi</option>
                            <option value="doctorPreterm" data-i18n="pretermFollowUp">Preterm Takibi</option>
                            <option value="newest" data-i18n="newest">En Yeni</option>
                            <option value="oldest" data-i18n="oldest">En Eski</option>
                        </select>
                    </div>

                </div>
                <div id="list"></div>

            </div>

            <!-- SAĞ -->
            <div class="summary-box">
                <h3 data-i18n="overview">Genel Durum</h3>

                <p><span data-i18n="totalPatients">Toplam Hasta</span>: <b id="totalCount">0</b></p>
                <p><span data-i18n="highRisk">Yüksek Risk</span>: <b id="highCount">0</b></p>
                <p><span data-i18n="mediumRisk">Orta Risk</span>: <b id="mediumCount">0</b></p>
                <p><span data-i18n="normal">Normal</span>: <b id="normalCount">0</b></p>
            </div>

        </div>

    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="patients.js"></script>

</body>
</html>
