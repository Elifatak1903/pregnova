<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PregNova</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/account_pregnant.css">
</head>
<body>
<div class="container">
    <div class="sidebar"></div>
    <div class="main">
        <div class="top-bar">
            <h1 class="page-title" data-i18n="account">Hesabım</h1>
        </div>
        <div class="account-content">
            <p class="subtitle" data-i18n="accountSettingsSubtitle">
                Hesap ayarlarını buradan yönetebilirsin
            </p>
            <div class="account-buttons">
                <button onclick="kisiselBilgiKontrol()">👤 <span data-i18n="personalInfo">Kişisel Bilgiler</span></button>
                <button onclick="go('measurement_history.html')">📊 <span data-i18n="lastMeasurementHistory">Ölçüm Geçmişi</span></button>
                <button onclick="go('nutrition_history.html')">🍽️ <span data-i18n="nutritionSupplementHistory">Besin Geçmişi</span></button>
                <button onclick="go('change_password.html')">🔒 <span data-i18n="changePassword">Şifre Değiştir</span></button>
                <button class="primary" onclick="go('expert_application.html')">🩺 <span data-i18n="expertApplication">Uzman Olarak Başvur</span></button>
            </div>
            <div class="logout">
                <button class="danger" onclick="logout()">🚪 <span data-i18n="logoutAction">Çıkış Yap</span></button>
            </div>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
<script type="module" src="account_pregnant.js"></script>
</body>
</html>
