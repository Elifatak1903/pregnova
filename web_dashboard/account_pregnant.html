<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hesabım</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/account_pregnant.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('pregnant.html')"><span>🏠</span> Ana Sayfa</li>
            <li onclick="go('messages_pregnant.html')"><span>💬</span> Mesajlar</li>
            <li onclick="go('expert_search.html')"><span>🔍</span> Uzman Ara</li>
            <li class="active">👤 Hesabım</li>
            <li onclick="logout()"><span>🚪</span> Çıkış</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1 class="page-title">Hesabım</h1>
        </div>

        <div class="account-content">

            <p class="subtitle">
                Hesap ayarlarını buradan yönetebilirsin
            </p>

            <div class="account-buttons">

                <button onclick="go('profile_view.html')">
                    👤 Kişisel Bilgiler
                </button>

                <button onclick="go('measurement_history.html')">
                    📊 Ölçüm Geçmişi
                </button>

                <button onclick="go('nutrition_history.html')">
                    🍽️ Besin Geçmişi
                </button>

                <button onclick="go('change_password.html')">
                    🔒 Şifre Değiştir
                </button>

                <hr>

                <button class="primary" onclick="go('expert_application.html')">
                    🩺 Uzman Olarak Başvur
                </button>

            </div>

            <div class="logout">
                <button class="danger" onclick="logout()">
                    🚪 Çıkış Yap
                </button>
            </div>

        </div>

    </div>

</div>

<script type="module" src="account_pregnant.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
