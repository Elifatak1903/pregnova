<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Uzman Başvuruları</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/admin_requests.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <div class="main">

        <div class="top-bar">
            <h1 class="page-title" data-i18n="expertApplications">Uzman Başvuruları</h1>
        </div>

        <div class="filters">

            <input type="text" id="searchInput" data-i18n-placeholder="searchExpertApplicationsPlaceholder" placeholder="E-posta, hastane veya lisans ara...">

            <div class="filter-buttons">
                <button onclick="setRoleFilter('all')" data-i18n="all">Tümü</button>
                <button onclick="setRoleFilter('gynecologist')" data-i18n="gynecologists">Jinekologlar</button>
                <button onclick="setRoleFilter('dietitian')" data-i18n="dietitians">Diyetisyenler</button>
            </div>

            <div class="filter-buttons">
                <button onclick="setStatusFilter('all')" data-i18n="allStatuses">Tüm Durumlar</button>
                <button onclick="setStatusFilter('pending')" data-i18n="pending">Bekleyen</button>
                <button onclick="setStatusFilter('approved')" data-i18n="approved">Onaylanan</button>
                <button onclick="setStatusFilter('rejected')" data-i18n="rejected">Reddedilen</button>
            </div>

        </div>

        <div id="requestList" class="request-list"></div>

    </div>

</div>

<div id="detailModal" class="detail-modal hidden">
    <div class="detail-panel">
        <button id="closeDetailModal" class="modal-close">×</button>
        <h2 data-i18n="applicationDetail">Başvuru Detayı</h2>
        <div id="detailContent"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="admin_requests.js"></script>

</body>
</html>
