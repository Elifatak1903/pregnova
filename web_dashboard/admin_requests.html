<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Uzman Başvuruları</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/admin_requests.css">
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('admin.html')">📊 Dashboard</li>
            <li class="active">📩 Uzman Başvuruları</li>
            <li onclick="go('admin_users.html')">👥 Kullanıcı Yönetimi</li>
            <li onclick="go('admin_reports.html')">📄 Sistem Raporları</li>
            <li onclick="logout()">🚪 Çıkış</li>
        </ul>
    </div>

    <div class="main">

        <div class="top-bar">
            <h1 class="page-title">Uzman Başvuruları 📩</h1>
        </div>

        <div class="filters">

            <input type="text" id="searchInput" placeholder="E-posta, hastane veya lisans ara...">

            <div class="filter-buttons">
                <button onclick="setRoleFilter('all')">Tümü</button>
                <button onclick="setRoleFilter('gynecologist')">Jinekologlar</button>
                <button onclick="setRoleFilter('dietitian')">Diyetisyenler</button>
            </div>

            <div class="filter-buttons">
                <button onclick="setStatusFilter('all')">Tüm Durumlar</button>
                <button onclick="setStatusFilter('pending')">Bekleyen</button>
                <button onclick="setStatusFilter('approved')">Onaylanan</button>
                <button onclick="setStatusFilter('rejected')">Reddedilen</button>
            </div>

        </div>

        <div id="requestList" class="request-list"></div>

    </div>

</div>

<div id="detailModal" class="detail-modal hidden">
    <div class="detail-panel">
        <button id="closeDetailModal" class="modal-close">×</button>
        <h2>Başvuru Detayı</h2>
        <div id="detailContent"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="admin_requests.js"></script>

</body>
</html>
