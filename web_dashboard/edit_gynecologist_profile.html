<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PregNova</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/edit_profile.css">
</head>
<body class="gynecologist">
<div class="container">
    <div class="sidebar"></div>
    <div class="main">
        <div class="top-bar">
            <h1 class="page-title" data-i18n="editInfo">Bilgileri Düzenle</h1>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label data-i18n="fullName">İsim Soyisim</label>
                <input type="text" id="name">
            </div>
            <div class="form-group">
                <label data-i18n="email">Email</label>
                <input type="text" id="email" disabled>
            </div>
            <div class="form-group">
                <label data-i18n="licenseNumber">Lisans Numarası</label>
                <input type="text" id="license">
            </div>
            <div class="form-group">
                <label data-i18n="experience">Deneyim</label>
                <input type="text" id="experience">
            </div>
            <div class="form-group">
                <label data-i18n="hospital">Hastane</label>
                <input type="text" id="hospital">
            </div>
            <button id="uploadBtn" type="button"><span class="plain-icon">DOC</span> <span data-i18n="uploadDiploma">Diploma Yükle</span></button>
            <p id="uploadStatus"></p>
            <button class="save-btn" onclick="saveData()" data-i18n="save">Kaydet</button>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
<script type="module" src="edit_gynecologist_profile.js"></script>
</body>
</html>
