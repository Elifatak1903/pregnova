<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kullanıcı Yönetimi</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/admin_users.css">
</head>

<body class="admin">

<div class="container">

    <div class="sidebar"></div>

    <div class="main">

        <div class="top-bar">
            <h1 data-i18n="userManagement">Kullanıcı Yönetimi</h1>
        </div>

        <div class="user-filters">
            <button onclick="setRoleFilter('all')" data-i18n="all">Tümü</button>
            <button onclick="setRoleFilter('pregnant')" data-i18n="pregnantUsers">Hamileler</button>
            <button onclick="setRoleFilter('gynecologist')" data-i18n="gynecologists">Jinekologlar</button>
            <button onclick="setRoleFilter('dietitian')" data-i18n="dietitians">Diyetisyenler</button>
        </div>

        <input id="searchInput" data-i18n-placeholder="searchUserPlaceholder" placeholder="İsim veya e-posta ara..." />

        <div id="userList"></div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="admin_users.js"></script>

</body>
</html>
