<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hasta Detay</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/patient_detail.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1 id="patientName" class="page-title"></h1>
        </div>

        <div class="detail-layout">

            <!-- SOL -->
            <div class="left">

                <h2 class="section-title" data-i18n="charts">Grafikler</h2>

                <div class="chart-box">
                    <canvas id="sugarChart"></canvas>
                </div>

                <div class="chart-box">
                    <canvas id="bpChart"></canvas>
                </div>

            </div>

            <!-- SAĞ -->
            <div class="right">

                <h2 class="section-title" data-i18n="measurements">Ölçümler</h2>

                <div id="measurementsList"></div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>
<script type="module" src="patient_detail.js"></script>

</body>
</html>
