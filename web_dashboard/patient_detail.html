<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hasta Detay</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/patient_detail.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1 id="patientName" class="page-title"></h1>
            <div class="patient-actions">
                <button id="patientMenuButton" class="patient-menu-button" type="button">⋯</button>
                <div id="patientMenu" class="patient-menu hidden">
                    <button id="assignRiskButton" type="button" data-i18n="assignRisk">Risk Ata</button>
                    <button id="feedbackButton" type="button" data-i18n="giveFeedback">Geri Dönüş Ver</button>
                    <button id="removePatientButton" type="button" data-i18n="removeFromList">Listeden Çıkar</button>
                </div>
            </div>
        </div>

        <div id="doctorRiskTags" class="doctor-risk-tags"></div>

        <div class="card">
            <div id="patientInfo">Bilgiler yükleniyor...</div>
        </div>

        <div class="detail-layout">

            <!-- SOL -->
            <div class="left">

                <h2 class="section-title" data-i18n="charts">Grafikler</h2>

                <div class="chart-box">
                    <canvas id="sugarChart"></canvas>
                </div>

                <div class="chart-box">
                    <canvas id="bpChart"></canvas>
                </div>

                <div class="chart-box">
                    <canvas id="weightChart"></canvas>
                </div>

            </div>

            <!-- SAĞ -->
            <div class="right">

                <h2 class="section-title" data-i18n="measurements">Ölçümler</h2>

                <select id="measurementDateFilter" class="detail-filter"></select>

                <div id="measurementsList"></div>

            </div>

        </div>

    </div>

</div>

<div id="riskModal" class="modal hidden">
    <div class="modal-card">
        <h2 data-i18n="followUpRisks">Takip Riskleri</h2>

        <label class="risk-check">
            <input type="checkbox" id="riskPreeclampsia">
            <span data-i18n="preeclampsiaFollowUp">Preeklampsi Takibi</span>
        </label>

        <label class="risk-check">
            <input type="checkbox" id="riskDiabetes">
            <span data-i18n="diabetesFollowUp">Gestasyonel Diyabet Takibi</span>
        </label>

        <label class="risk-check">
            <input type="checkbox" id="riskPreterm">
            <span data-i18n="pretermFollowUp">Preterm Takibi</span>
        </label>

        <div class="modal-actions">
            <button id="cancelRiskButton" type="button" data-i18n="cancel">İptal</button>
            <button id="saveRiskButton" type="button" data-i18n="save">Kaydet</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>
<script type="module" src="patient_detail.js"></script>

</body>
</html>
