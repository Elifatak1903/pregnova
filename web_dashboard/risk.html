<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Risk Ölçüm</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/risk.css">
</head>

<body class="pregnant">

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">
            <h1 class="page-title" data-i18n="riskMeasurement">Risk Ölçüm</h1>

            <!-- NOTIFICATION -->
            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge"></span>

                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList"></div>
                </div>
            </div>
        </div>

        <!-- FORM -->
        <div class="content">

            <div class="form-container">

                <input id="kilo" data-i18n-placeholder="weightKgPlaceholder" placeholder="Kilo (kg)">

                <!-- PRE -->
                <h3 data-i18n="preeclampsia">Preeklampsi</h3>

                <input id="sistolik" data-i18n-placeholder="systolicPlaceholder" placeholder="Sistolik">
                <input id="diastolik" data-i18n-placeholder="diastolicPlaceholder" placeholder="Diastolik">

                <div class="checkbox-item">
                    <input type="checkbox" id="basAgrisi">
                    <label for="basAgrisi" data-i18n="headache">Baş ağrısı</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="gorme">
                    <label for="gorme" data-i18n="visionProblem">Görme bozukluğu</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="sislik">
                    <label for="sislik" data-i18n="swelling">Şişlik</label>
                </div>

                <!-- DİYABET -->
                <h3 data-i18n="diabetes">Diyabet</h3>

                <input id="aclik" data-i18n-placeholder="fastingSugarPlaceholder" placeholder="Açlık şekeri">
                <input id="tokluk" data-i18n-placeholder="postprandialSugarPlaceholder" placeholder="Tokluk şekeri">

                <div class="checkbox-item">
                    <input type="checkbox" id="susama">
                    <label for="susama" data-i18n="excessiveThirst">Aşırı susama</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="idrar">
                    <label for="idrar" data-i18n="frequentUrination">Sık idrar</label>
                </div>
                <!-- PRETERM -->
                <h3 data-i18n="preterm">Preterm</h3>

                <div class="checkbox-item">
                    <input type="checkbox" id="kasilma">
                    <label for="kasilma" data-i18n="abdominalContraction">Karın kasılması</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="akinti">
                    <label for="akinti" data-i18n="discharge">Akıntı</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="bel">
                    <label for="bel" data-i18n="backPain">Bel ağrısı</label>
                </div>

                <div class="slider-box">
                    <p><span data-i18n="stressLevel">Stres Seviyesi</span>: <b id="stresValue">1</b></p>
                    <input type="range" id="stres" min="1" max="5" value="1">
                </div>

                <button onclick="calculateRisk()" data-i18n="saveMeasurement">Kaydet</button>

            </div>

        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="risk.js"></script>

<script>
    const slider = document.getElementById("stres");
    const value = document.getElementById("stresValue");

    slider.oninput = () => {
        value.innerText = slider.value;
    };
</script>
<!-- MODAL -->
<div id="resultModal" class="modal hidden">
    <div class="modal-box">
        <h3 data-i18n="riskResult">Risk Sonucu</h3>
        <p id="resultText"></p>
        <button onclick="closeModal()" data-i18n="ok">Tamam</button>
    </div>
</div>
</body>
</html>
