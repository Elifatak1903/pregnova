<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PregNova</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="welcome-body">

<div class="language-switcher" aria-label="Dil">
    <button type="button" data-lang="tr" onclick="setPregnovaLanguage('tr')">TR</button>
    <button type="button" data-lang="en" onclick="setPregnovaLanguage('en')">EN</button>
</div>

<div class="welcome-container">

    <div class="logo-circle">
        <img src="assets/icon/app_icon.jpeg" alt="PregNova">
    </div>

    <h1 class="title" data-i18n="welcomeTitle">PregNova'ya Hoş Geldin</h1>

    <p class="desc" data-i18n="welcomeDescription">
        Hamilelik sürecini güvenle takip edebilmen için sağlık ve beslenme takibi tek yerde
    </p>

    <button class="main-btn" onclick="window.location.href='login.html'" data-i18n="getStarted">
        Kullanmaya Başla
    </button>
</div>

<script type="module">
    import { applyTranslations, getLanguage, setLanguage } from "./i18n.js";

    function syncLanguageButtons() {
      document.querySelectorAll("[data-lang]").forEach(button => {
        button.classList.toggle("active", button.dataset.lang === getLanguage());
      });
    }

    window.setPregnovaLanguage = function(lang) {
      setLanguage(lang);
      applyTranslations();
      syncLanguageButtons();
    };

    document.addEventListener("DOMContentLoaded", () => {
      applyTranslations();
      syncLanguageButtons();
    });

    window.addEventListener("pregnova:languageChanged", () => {
      applyTranslations();
      syncLanguageButtons();
    });
</script>

</body>
</html>
