<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hamile Paneli</title>

    <!-- ROLE -->
    <script>
        const role = localStorage.getItem("role");
        if (role) {
          document.documentElement.className = role;
        }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pregnant.css">
</head>

<body class="pregnant">

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">

            <h1 class="page-title">PregNova</h1>

            <!-- NOTIFICATION -->
            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge"></span>

                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList" class="notif-list"></div>

                    <div class="notif-footer" onclick="go('notifications.html')" data-i18n="viewAll">
                        Tümünü Gör →
                    </div>
                </div>
            </div>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- HOŞ GELDİN -->
            <h2 class="welcome" data-i18n="welcomeMother">Hoş geldin anne</h2>
            <p class="subtitle" data-i18n="healthTrackingSubtitle">Sağlık ve beslenme takibini kolayca yapabilirsin.</p>

            <!-- HAFTA KART -->
            <div class="week-card">
                <div class="icon">👶</div>
                <div>
                    <p data-i18n="now">Şu an</p>
                    <h3 id="weekText">-</h3>
                </div>
            </div>

            <!-- RISK -->
            <div class="card">
                <h3 data-i18n="latestRiskStatus">Son Risk Durumu</h3>
                <div id="riskBox"></div>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">

                <div class="action-card" onclick="go('risk.html')">
                    <span data-i18n="riskMeasurement">Risk Ölçüm</span>
                </div>

                <div class="action-card" onclick="go('nutrition.html')">
                    <span data-i18n="nutritionAnalysis">Besin Analizi</span>
                </div>

                <div class="action-card" onclick="go('measurement_history.html')">
                    <span data-i18n="measurementHistory">Ölçüm Geçmişi</span>
                </div>

                <div class="action-card" onclick="go('nutrition_history.html')">
                    <span data-i18n="nutritionHistory">Besin Geçmişi</span>
                </div>

            </div>

        </div>

    </div>
</div>

<div id="profileModal" class="profile-modal hidden">
    <div class="profile-modal-backdrop"></div>

    <div class="profile-modal-card">
        <h2 data-i18n="completeProfile">Profilini tamamla</h2>
        <p data-i18n="completeProfileText">Gebelik haftanı, boyunu, kilonu ve risk bilgilerini ekleyerek PregNova'yı daha doğru kullanabilirsin.</p>

        <div class="profile-modal-actions">
            <button class="secondary-btn" onclick="closeProfileModal()" data-i18n="later">Daha Sonra</button>
            <button class="primary-btn" onclick="go('profile_edit.html')" data-i18n="complete">Tamamla</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="pregnant.js"></script>

</body>
</html>
