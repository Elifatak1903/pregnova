<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hamile Paneli</title>

    <!-- ROLE -->
    <script>
        const role = localStorage.getItem("role");
        if (role) {
          document.documentElement.className = role;
        }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pregnant.css">
</head>

<body class="pregnant">

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li class="active">
                <span>🏠</span> Ana Sayfa
            </li>

            <li onclick="go('messages_pregnant.html')">
                <span>💬</span> Mesajlar
            </li>

            <li onclick="go('expert_search.html')">
                <span>🔍</span> Uzman Ara
            </li>

            <li onclick="go('account_pregnant.html')">
                <span>👤</span> Hesabım
            </li>

            <li onclick="logout()">
                <span>🚪</span> Çıkış
            </li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">

            <h1 class="page-title">PregNova</h1>

            <!-- NOTIFICATION -->
            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge"></span>

                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList" class="notif-list"></div>

                    <div class="notif-footer" onclick="go('notifications.html')">
                        Tümünü Gör →
                    </div>
                </div>
            </div>

        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- HOŞ GELDİN -->
            <h2 class="welcome">Hoş geldin anne 💕</h2>
            <p class="subtitle">Sağlık ve beslenme takibini kolayca yapabilirsin.</p>

            <!-- HAFTA KART -->
            <div class="week-card">
                <div class="icon">👶</div>
                <div>
                    <p>Şu an</p>
                    <h3 id="weekText">-</h3>
                </div>
            </div>

            <!-- RISK -->
            <div class="card">
                <h3>Son Risk Durumu</h3>
                <div id="riskBox"></div>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">

                <div class="action-card" onclick="go('risk.html')">
                    ❤️ Risk Ölçüm
                </div>

                <div class="action-card" onclick="go('nutrition.html')">
                    🍽️ Besin Analizi
                </div>

                <div class="action-card" onclick="go('measurement_history.html')">
                    📊 Ölçüm Geçmişi
                </div>

                <div class="action-card" onclick="go('nutrition_history.html')">
                    💊 Besin Geçmişi
                </div>

            </div>

        </div>

    </div>
</div>

<script type="module" src="pregnant.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
