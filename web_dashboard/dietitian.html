<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Diyetisyen Paneli</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/dietitian.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li class="active" onclick="go('dietitian.html')">🏠 Ana Sayfa</li>
            <li onclick="go('dietitian_clients.html')">👩‍⚕️ Danışanlar</li>
            <li onclick="go('dietitian_requests.html')">⏳ İstekler</li>
            <li onclick="go('messages_dietitian.html')">💬 Mesajlar</li>
            <li onclick="go('account_dietitian.html')">👤 Hesap</li>
            <li onclick="logout()">🚪 Çıkış</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1 class="page-title">Diyetisyen Paneli 🥗</h1>
        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="card" onclick="go('dietitian_clients.html')">
                <h3>Danışan</h3>
                <p id="approvedCount">0</p>
            </div>

            <div class="card" onclick="go('dietitian_requests.html')">
                <h3>Bekleyen İstek</h3>
                <p id="pendingCount">0</p>
            </div>

            <div class="card" onclick="go('son_analizler.html')">
                <h3>Son 7 Gün</h3>
                <p id="activeCount">0</p>
            </div>

            <div class="card" onclick="go('select_client_for_diet.html')">
                <h3>Beslenme Modülü</h3>
                <p>Aç</p>
            </div>

        </div>

        <!-- ACTIVITY -->
        <div class="section">
            <h2>Son Aktiviteler</h2>
            <div id="activityList"></div>
        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="dietitian.js"></script>

</body>
</html>
