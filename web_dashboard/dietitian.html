<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Diyetisyen Paneli</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/dietitian.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1 class="page-title" data-i18n="dietitianPanel">Diyetisyen Paneli</h1>
            <div class="notification-btn" onclick="toggleNotifications(event)">
                <span class="notification-mark" aria-hidden="true"></span>
                <span class="badge"></span>
                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList" class="notif-list"></div>
                    <div class="notif-footer" onclick="openNotificationsPage(event)" data-i18n="viewAll">
                        Tumunu Gor ->
                    </div>
                </div>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="card" onclick="go('dietitian_clients.html')">
                <h3 data-i18n="clients">Danışanlar</h3>
                <p id="approvedCount">0</p>
            </div>

            <div class="card" onclick="go('dietitian_requests.html')">
                <h3 data-i18n="pendingRequest">Bekleyen İstek</h3>
                <p id="pendingCount">0</p>
            </div>

            <div class="card" onclick="go('son_analizler.html')">
                <h3 data-i18n="last7Days">Son 7 Gün</h3>
                <p id="activeCount">0</p>
            </div>

            <div class="card" onclick="go('select_client_for_diet.html')">
                <h3 data-i18n="nutritionModule">Beslenme Modülü</h3>
                <p data-i18n="open">Aç</p>
            </div>

        </div>

        <!-- ACTIVITY -->
        <div class="section">
            <h2 data-i18n="recentActivities">Son Aktiviteler</h2>
            <div id="activityList"></div>
        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="dietitian.js"></script>

</body>
</html>
