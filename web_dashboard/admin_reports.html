<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Raporları</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/admin_reports.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="admin">

<div class="container">

    <div class="sidebar"></div>

    <div class="main">

        <div class="top-bar">
            <h1 data-i18n="systemReportsTitle">Sistem Raporları</h1>
        </div>

        <div class="top-stats">
            <div class="stat-card">
                <span data-i18n="totalUsers">Toplam Kullanıcı</span>
                <strong id="totalUsers">0</strong>
            </div>

            <div class="stat-card">
                <span data-i18n="pregnantUsers">Hamileler</span>
                <strong id="pregnantUsers">0</strong>
            </div>

            <div class="stat-card">
                <span data-i18n="gynecologist">Jinekolog</span>
                <strong id="doctorUsers">0</strong>
            </div>

            <div class="stat-card">
                <span data-i18n="dietitian">Diyetisyen</span>
                <strong id="dietitianUsers">0</strong>
            </div>
        </div>

        <div class="top-stats secondary-stats">
            <div class="stat-card">
                <span data-i18n="riskMeasurementCount">Risk Ölçümü</span>
                <strong id="riskMeasurements">0</strong>
            </div>

            <div class="stat-card">
                <span data-i18n="nutritionAnalysisCount">Besin Analizi</span>
                <strong id="nutritionAnalyses">0</strong>
            </div>

            <div class="stat-card">
                <span data-i18n="pendingApplication">Bekleyen Başvuru</span>
                <strong id="pendingApplications">0</strong>
            </div>

            <div class="stat-card">
                <span data-i18n="approvalReject">Onay / Ret</span>
                <strong><span id="approvedApplications">0</span> / <span id="rejectedApplications">0</span></strong>
            </div>
        </div>

        <div class="report-grid">

            <div class="chart-card">
                <h3 data-i18n="riskDistribution">Risk Dağılımı</h3>
                <canvas id="riskChart"></canvas>
            </div>

            <div>
                <div id="insightCard" class="insight-card">
                    <span data-i18n="analyzing">Analiz ediliyor...</span>
                </div>

                <div id="riskBars"></div>
            </div>

        </div>

        <div class="bottom-insight">
            <h3 data-i18n="systemInsight">Sistem İçgörüsü</h3>
            <p id="highPercentText"></p>
            <p id="systemComment"></p>
        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="admin_reports.js"></script>

</body>
</html>
