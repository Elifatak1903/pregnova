<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Diyet Planım</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pregnant_diet.css">
</head>

<body class="pregnant">

<div class="container">

    <div class="sidebar"></div>

    <div class="main">
        <div class="top-bar">
            <h1 class="page-title" data-i18n="myDietPlan">Diyet Planım</h1>
        </div>

        <div class="diet-page">

            <div class="diet-hero">
                <div>
                    <p class="eyebrow" data-i18n="myDietPlan">Diyet Planım</p>
                    <h2 data-i18n="dietPlanSubtitle">Diyetisyeninin hazırladığı güncel plan</h2>
                    <p class="hero-desc" data-i18n="dietPlanInfo">
                        Güncel diyet planını görüntüleyebilir ve öğün detaylarını inceleyebilirsin.
                    </p>
                </div>

                <div class="diet-icon">D</div>
            </div>

            <div id="dietState" class="state-card" data-i18n="loading">Yükleniyor...</div>

            <button id="dietSummary" class="diet-summary hidden" type="button">
                <div class="summary-left">
                    <div class="summary-icon">T</div>
                    <div>
                        <span id="summaryDate">-</span>
                        <p data-i18n="latestDietPlan">Güncel diyet planı</p>
                    </div>
                </div>

                <b data-i18n="viewDiet">Diyeti Gör</b>
            </button>

            <div id="previousDietSection" class="previous-diets hidden">
                <h2 data-i18n="previousDietPlans">Önceki Diyet Planları</h2>
                <div id="previousDietList"></div>
            </div>

        </div>
</div>

<div id="dietModal" class="diet-modal hidden">
    <div class="diet-modal-backdrop" onclick="closeDietModal()"></div>

    <div class="diet-modal-panel">
        <div class="modal-handle"></div>

        <div class="modal-header">
            <div>
                <p class="eyebrow" data-i18n="dietDetail">Diyet detayı</p>
                <h2 id="modalTitle" data-i18n="myDietPlan">Diyet Planım</h2>
            </div>

            <button class="close-btn" onclick="closeDietModal()" type="button">×</button>
        </div>

        <div id="dietPlan" class="meal-grid">
            <div class="meal-card" data-field="kahvalti">
                <span data-i18n="breakfast">Kahvaltı</span>
                <p></p>
            </div>

            <div class="meal-card" data-field="ara1">
                <span data-i18n="snack1">Ara Öğün 1</span>
                <p></p>
            </div>

            <div class="meal-card" data-field="ogle">
                <span data-i18n="lunch">Öğle</span>
                <p></p>
            </div>

            <div class="meal-card" data-field="ara2">
                <span data-i18n="snack2">Ara Öğün 2</span>
                <p></p>
            </div>

            <div class="meal-card" data-field="aksam">
                <span data-i18n="dinner">Akşam</span>
                <p></p>
            </div>

            <div class="meal-card" data-field="gece">
                <span data-i18n="night">Gece</span>
                <p></p>
            </div>

            <div class="meal-card note-card" data-field="notlar">
                <span data-i18n="notes">Notlar</span>
                <p></p>
            </div>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="pregnant_diet.js"></script>

</body>
</html>
