<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Uzman Ara</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/expert.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <div>
                <h1 class="page-title" data-i18n="searchExpert">Uzman Ara</h1>
                <p class="page-subtitle" data-i18n="searchExpertSubtitle">
                    Doktor veya diyetisyen seçerek danışan isteği gönderebilirsin.
                </p>
            </div>
        </div>

        <div class="filter-card">
            <div class="search-box">
                <span class="plain-icon">ARA</span>
                <input id="searchInput" data-i18n-placeholder="searchNamePlaceholder" placeholder="İsim ara...">
            </div>

            <select id="roleFilter">
                <option value="" data-i18n="all">Tümü</option>
                <option value="gynecologist" data-i18n="gynecologist">Jinekolog</option>
                <option value="dietitian" data-i18n="dietitian">Diyetisyen</option>
            </select>
        </div>

        <div id="expertList" class="expert-list"></div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="expert.js"></script>

</body>
</html>
