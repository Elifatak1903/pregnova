<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Diyet Oluştur</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/create_diet.css">
</head>

<body class="dietitian">

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">
            <h1 class="page-title" data-i18n="createDietPlan">Diyet Planı Oluştur</h1>
        </div>

        <!-- FORM -->
        <div class="form-container">

            <textarea id="kahvalti" data-i18n-placeholder="breakfast" placeholder="Kahvaltı"></textarea>
            <textarea id="ara1" data-i18n-placeholder="snack1" placeholder="Ara Öğün 1"></textarea>
            <textarea id="ogle" data-i18n-placeholder="lunch" placeholder="Öğle"></textarea>
            <textarea id="ara2" data-i18n-placeholder="snack2" placeholder="Ara Öğün 2"></textarea>
            <textarea id="aksam" data-i18n-placeholder="dinner" placeholder="Akşam"></textarea>
            <textarea id="gece" data-i18n-placeholder="night" placeholder="Gece"></textarea>
            <textarea id="notlar" data-i18n-placeholder="notes" placeholder="Notlar"></textarea>

            <button onclick="saveDiet()" data-i18n="save">Kaydet</button>

        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="create_diet.js"></script>

</body>
</html>
