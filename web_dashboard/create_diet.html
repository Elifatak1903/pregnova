<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Diyet Oluştur</title>

</head>

<body class="dietitian">

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">

        </h2>

        <ul>
