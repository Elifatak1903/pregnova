<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Danışan Detayı</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/client_detail.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dietitian">

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('dietitian.html')">🏠 Ana Sayfa</li>
            <li onclick="go('dietitian_clients.html')">👩‍⚕️ Danışanlar</li>
            <li onclick="go('dietitian_requests.html')">⏳ İstekler</li>
            <li onclick="go('messages_dietitian.html')">💬 Mesajlar</li>
            <li onclick="go('account_dietitian.html')">👤 Hesap</li>
            <li onclick="logout()">🚪 Çıkış</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">
            <h1 id="patientName" class="page-title">Yükleniyor...</h1>
        </div>

        <!-- USER INFO -->
        <div class="card">
            <p id="patientInfo">Bilgiler yükleniyor...</p>
        </div>

        <!-- LAYOUT -->
        <div class="detail-layout">

            <!-- SOL -->
            <div class="left">

                <h2 class="section-title">Grafikler</h2>

                <div class="chart-box">
                    <canvas id="calorieChart"></canvas>
                </div>

                <div class="chart-box">
                    <canvas id="weightChart"></canvas>
                </div>

            </div>

            <!-- SAĞ -->
            <div class="right">

                <h2 class="section-title">Besin Analizleri</h2>

                <div id="analysisList">
                    Yükleniyor...
                </div>

            </div>

        </div>

    </div>
</div>

<!-- SCRIPTS -->
<script type="module" src="app.js"></script>
<script type="module" src="client_detail.js"></script>

</body>
</html>
