<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Danışan Detayı</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/client_detail.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dietitian">

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">
            <h1 id="patientName" class="page-title" data-i18n="loading">Yükleniyor...</h1>
        </div>

        <!-- USER INFO -->
        <div class="card">
            <p id="patientInfo" data-i18n="infoLoading">Bilgiler yükleniyor...</p>
        </div>

        <!-- LAYOUT -->
        <div class="detail-layout">

            <!-- SOL -->
            <div class="left">

                <h2 class="section-title" data-i18n="charts">Grafikler</h2>

                <div class="chart-box">
                    <canvas id="calorieChart"></canvas>
                </div>

                <div class="chart-box">
                    <canvas id="weightChart"></canvas>
                </div>

            </div>

            <!-- SAĞ -->
            <div class="right">

                <h2 class="section-title" data-i18n="nutritionAnalysesTitle">Besin Analizleri</h2>

                <div id="analysisList">
                    <span data-i18n="loading">Yükleniyor...</span>
                </div>

            </div>

        </div>

    </div>
</div>

<!-- SCRIPTS -->
<script type="module" src="app.js"></script>
<script type="module" src="client_detail.js"></script>

</body>
</html>
