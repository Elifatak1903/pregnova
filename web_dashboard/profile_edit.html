<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bilgileri Düzenle</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/profile_edit.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('pregnant.html')"><span>🏠</span> Ana Sayfa</li>
            <li onclick="go('messages_pregnant.html')"><span>💬</span> Mesajlar</li>
            <li onclick="go('expert_search.html')"><span>🔍</span> Uzman Ara</li>
            <li onclick=go('account_pregnant.html')>👤 Hesabım</li>
            <li onclick="logout()"><span>🚪</span> Çıkış</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1 class="page-title">Kişisel Bilgiler</h1>
        </div>

        <div class="form" id="form">

            <!-- INPUT GROUP -->
            <div class="input-group">
                <label>Yaş</label>
                <input type="number" id="yas" placeholder="Örn: 26">
            </div>

            <div class="input-group">
                <label>Güncel Kilo (kg)</label>
                <input type="number" id="kilo" placeholder="Örn: 60">
            </div>

            <div class="input-group">
                <label>Hamilelik Haftası</label>
                <input type="number" id="hafta" placeholder="Örn: 24">
            </div>

            <hr>

            <!-- RISK TITLE -->
            <h3 class="section-title">Risk Faktörleri</h3>

            <!-- CHECKBOX GROUP -->
            <div class="checkbox-group">

                <label class="checkbox-item">
                    <input type="checkbox" id="chronicHypertension">
                    Kronik Hipertansiyon
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" id="diabetes">
                    Diyabet
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" id="thyroidDisease">
                    Tiroid Hastalığı
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" id="previousPreterm">
                    Önceki Preterm
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" id="multiplePregnancy">
                    Çoğul Gebelik
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" id="smoker">
                    Sigara Kullanımı
                </label>

            </div>

            <button onclick="saveProfile()" class="save-btn">
                💾 Kaydet
            </button>

        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="profile_edit.js"></script>

</body>
</html>
