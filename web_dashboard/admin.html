<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP -->
        <div class="top-bar">
            <h1 class="page-title" data-i18n="adminDashboard">Admin Dashboard</h1>
        </div>

        <!-- WELCOME -->
        <div class="welcome-box">
            <h2 data-i18n="welcomeAdmin">Welcome Admin</h2>
            <p data-i18n="systemMonitoringApprovals">System monitoring & approvals</p>
        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="card" onclick="go('admin_requests.html')">
                <h3 data-i18n="pendingRequests">Bekleyen Başvurular</h3>
                <p id="pendingCount">0</p>
            </div>

            <div class="card" onclick="go('admin_users.html')">
                <h3 data-i18n="totalUsers">Toplam Kullanıcı</h3>
                <p id="totalUsers">0</p>
            </div>

            <div class="card">
                <h3 data-i18n="activeExperts">Aktif Uzmanlar</h3>
                <p id="activeExperts">0</p>
            </div>

            <div class="card" onclick="go('admin_reports.html')">
                <h3 data-i18n="systemReports">Sistem Raporları</h3>
                <p id="reports">0</p>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="section">
            <h2 data-i18n="adminActions">Admin İşlemleri</h2>

            <div class="action-card" onclick="go('admin_requests.html')">
                <h3 data-i18n="expertApplications">Uzman Başvuruları</h3>
                <p data-i18n="approveRejectExpertRequests">Uzman başvurularını onayla veya reddet</p>
            </div>

            <div class="action-card" onclick="go('admin_users.html')">
                <h3 data-i18n="userManagement">Kullanıcı Yönetimi</h3>
                <p data-i18n="viewManageAllUsers">Tüm kullanıcıları görüntüle ve yönet</p>
            </div>

        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
