<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mesajlar</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/gynecologist.css">
    <link rel="stylesheet" href="css/messages_gynecologist.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex; align-items:center; gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('gynecologist.html')"><span>🏠</span> Dashboard</li>
            <li onclick="go('patients.html')"><span>👩‍⚕️</span> Danışanlar</li>
            <li onclick="go('requests_gynecologist.html')"><span>📥</span> İstekler</li>

            <li class="active"><span>💬</span> Mesajlar</li>

            <li onclick="go('account_gynecologist.html')"><span>👤</span> Hesabım</li>
            <li onclick="logout()"><span>🚪</span> Çıkış</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1 class="page-title">Mesajlar</h1>

        <div class="chat-layout">

            <!-- SOL -->
            <div id="chatList" class="chat-list"></div>

            <!-- SAĞ -->
            <div class="chat-window">

                <div id="chatHeader" class="chat-header">
                    <div class="chat-header-content">
                        <div class="avatar">👤</div>
                        <div id="chatHeaderText">Sohbet seç</div>
                    </div>
                </div>

                <div id="messages" class="chat-messages"></div>

                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz...">
                    <button onclick="sendMessage()">Gönder</button>
                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="messages_gynecologist.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
