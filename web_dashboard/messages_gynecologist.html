<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mesajlar</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/messages_gynecologist.css">
</head>

<body>

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">

            <h1 class="page-title" data-i18n="messages">Mesajlar</h1>

            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge"></span>

                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList" class="notif-list"></div>

                    <div class="notif-footer" onclick="go('notifications.html')" data-i18n="viewAll">
                        Tümünü Gör →
                    </div>
                </div>
            </div>

        </div>

        <div class="chat-layout">

            <!-- SOL -->
            <div id="chatList" class="chat-list"></div>

            <!-- SAĞ -->
            <div class="chat-window">

                <div id="chatHeader" class="chat-header">
                    <div class="chat-header-content">
                        <div class="avatar">👤</div>
                        <div id="chatHeaderText" data-i18n="selectChat">Sohbet seç</div>
                    </div>
                </div>

                <div id="messages" class="chat-messages"></div>

                <div class="chat-input">
                    <input type="text" id="messageInput" data-i18n-placeholder="messagePlaceholder" placeholder="Mesaj yaz...">
                    <button onclick="sendMessage()" data-i18n="send">Gönder</button>
                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="app.js"></script>
<script type="module" src="messages_gynecologist.js"></script>

</body>
</html>
