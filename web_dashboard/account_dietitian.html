<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PregNova</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/account_dietitian.css">
</head>
<body class="dietitian">
<div class="container">
    <div class="sidebar"></div>
    <div class="main">
        <div class="top-bar">
            <h1 class="page-title" data-i18n="account">Hesabım</h1>
        </div>
        <div class="profile-card">
            <div class="profile-left">
                <div class="avatar">👩‍⚕️</div>
                <div>
                    <h2 id="userName" data-i18n="loading">Yükleniyor...</h2>
                    <p id="userEmail"></p>
                    <span class="role" data-i18n="dietitian">Diyetisyen</span>
                </div>
            </div>
        </div>
        <button class="edit-btn" onclick="go('edit_profile.html')" data-i18n="editInfo">
            Bilgileri Düzenle
        </button>
        <h2 class="section-title" data-i18n="expertiseInfo">Uzmanlık Bilgileri</h2>
        <div class="info-card">
            <div>
                <b data-i18n="expertiseArea">Uzmanlık Alanı</b>
                <span id="expertise">-</span>
            </div>
        </div>
        <div class="info-card">
            <div>
                <b data-i18n="experience">Deneyim</b>
                <span id="experience">-</span>
            </div>
        </div>
        <div class="info-card">
            <div>
                <b data-i18n="institutionWorked">Çalıştığı Kurum</b>
                <span id="institution">-</span>
            </div>
        </div>
        <div class="menu-item" onclick="openDiploma()">
            📄 <span data-i18n="diplomaDocuments">Diploma / Belgeler</span>
        </div>
        <div id="diplomaStatus" class="badge hidden">
            ✔ <span data-i18n="diplomaUploaded">Diploma yüklendi</span>
        </div>
        <h2 class="section-title" data-i18n="settings">Ayarlar</h2>
        <div class="menu-item" onclick="go('change_password.html')">
            🔒 <span data-i18n="changePassword">Şifre Değiştir</span>
        </div>
        <div class="menu-item danger" onclick="logout()">
            🚪 <span data-i18n="logoutAction">Çıkış Yap</span>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
<script type="module" src="account_dietitian.js"></script>
</body>
</html>
