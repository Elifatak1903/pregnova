<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Besin Analizi</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/nutrition.css">
</head>

<body class="pregnant">

<div class="container">

    <div class="sidebar"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">
            <h1 class="page-title" data-i18n="nutritionAnalysis">Besin Analizi</h1>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- BESİN -->
            <div class="card">
                <h3><span class="plain-icon"></span> <span data-i18n="addFood">Besin Ekle</span></h3>

                <div class="input-group">
                    <input id="foodName" data-i18n-placeholder="foodNamePlaceholder" placeholder="Besin adı (örn: süt)">
                    <input id="foodAmount" type="number" data-i18n-placeholder="amount" placeholder="Miktar">

                    <select id="foodUnit">
                        <option value="tane" data-i18n="piece">Tane</option>
                        <option value="tabak" data-i18n="plate">Tabak</option>
                        <option value="bardak" data-i18n="glass">Bardak</option>
                        <option value="fincan" data-i18n="cup">Fincan</option>
                        <option value="kaşık" data-i18n="spoon">Kaşık</option>
                        <option value="gram" data-i18n="gram">Gram</option>
                        <option value="ml">ML</option>
                        <option value="ölçek" data-i18n="scoop">Ölçek</option>
                    </select>

                    <button class="small-btn" onclick="addFood()" data-i18n="addFood">
                        Besin Ekle
                    </button>
                </div>

                <div id="foodList" class="list"></div>
            </div>

            <!-- TAKVİYE -->
            <div class="card">
                <h3><span class="plain-icon"></span> <span data-i18n="addSupplement">Takviye Ekle</span></h3>

                <div class="input-group">

                    <input id="supName" data-i18n-placeholder="supplementNamePlaceholder" placeholder="Takviye adı">

                    <input id="supAmount" type="number" data-i18n-placeholder="count" placeholder="Adet">

                    <input id="supUnit" data-i18n-placeholder="unit" placeholder="Birim" readonly>

                    <button class="small-btn" onclick="addSupplement()" data-i18n="addSupplement">
                        Takviye Ekle
                    </button>

                </div>

                <div id="supList" class="list"></div>
            </div>

        </div>

        <!-- ANALİZ BUTON -->
        <button class="analyze-btn" onclick="saveAnalysis()">
            <span class="plain-icon"></span> <span data-i18n="analyze">Analiz Yap</span>
        </button>

        <div class="result-box hidden-result" id="resultBox">

            <div class="result-grid">
                <div class="result-panel">
                    <h3 data-i18n="currentAnalysisResult">Bu Analizin Sonucu</h3>

                    <div class="progress-container">
                        <p data-i18n="calories">Kalori</p>
                        <div class="progress-bar">
                            <div id="calorieBar" class="progress-fill"></div>
                        </div>
                        <span id="calorieText"></span>
                    </div>

                    <div>
                        <p data-i18n="missingNutrients">Eksik Besinler</p>
                        <div id="missingList" class="badge-container"></div>
                    </div>

                    <div>
                        <p data-i18n="excessNutrients">Fazla Besinler</p>
                        <div id="excessList" class="badge-container"></div>
                    </div>
                </div>

                <div class="result-panel hidden-result" id="dailyResultPanel">
                    <h3 data-i18n="dailyTotalAnalysisResult">Günlük Toplam Analiz Sonucu</h3>

                    <div class="progress-container">
                        <p data-i18n="dailyTotalCalories">Günlük Toplam Kalori</p>
                        <div class="progress-bar">
                            <div id="dailyCalorieBar" class="progress-fill"></div>
                        </div>
                        <span id="dailyCalorieText"></span>
                    </div>

                    <div>
                        <p data-i18n="missingNutrients">Eksik Besinler</p>
                        <div id="dailyMissingList" class="badge-container"></div>
                    </div>

                    <div>
                        <p data-i18n="excessNutrients">Fazla Besinler</p>
                        <div id="dailyExcessList" class="badge-container"></div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="nutrition.js"></script>

<script>
    window.showResult = function(result, dailyResult = null){
      document.getElementById("resultBox")
        .classList.remove("hidden-result");

      renderNutritionResult(result, {
        calorieText: "calorieText",
        calorieBar: "calorieBar",
        missingList: "missingList",
        excessList: "excessList"
      });

      const dailyPanel = document.getElementById("dailyResultPanel");
      if (dailyResult) {
        dailyPanel?.classList.remove("hidden-result");
        renderNutritionResult(dailyResult, {
          calorieText: "dailyCalorieText",
          calorieBar: "dailyCalorieBar",
          missingList: "dailyMissingList",
          excessList: "dailyExcessList"
        });
      } else {
        dailyPanel?.classList.add("hidden-result");
      }
    };

    function renderNutritionResult(result, ids) {
      const totalCalories = result?.totalCalories ?? 0;
      const calorieText = document.getElementById(ids.calorieText);
      const calorieBar = document.getElementById(ids.calorieBar);
      const missingList = document.getElementById(ids.missingList);
      const excessList = document.getElementById(ids.excessList);
      const noneText = window.pregnovaT ? window.pregnovaT("none") : "Yok";

      if (calorieText) calorieText.innerText = `${totalCalories} kcal`;
      if (calorieBar) {
        calorieBar.style.width = `${Math.min((totalCalories / 2500) * 100, 100)}%`;
      }
      if (missingList) {
        missingList.innerText = result?.missingNutrients?.length
          ? result.missingNutrients.join(", ")
          : noneText;
      }
      if (excessList) {
        excessList.innerText = result?.excessNutrients?.length
          ? result.excessNutrients.join(", ")
          : noneText;
      }
    };

    window.closeModal = function(){
      const resultModal = document.getElementById("resultModal");
      if (resultModal) resultModal.classList.add("hidden");
    };
</script>

</body>
</html>
