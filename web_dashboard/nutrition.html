<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Besin Analizi</title>

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/nutrition.css">
</head>

<body class="pregnant">

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 style="display:flex;align-items:center;gap:10px;">
            <img src="assets/icon/app_icon.jpeg" width="30">
            PregNova
        </h2>

        <ul>
            <li onclick="go('pregnant.html')">🏠 Ana Sayfa</li>
            <li onclick="go('messages_pregnant.html')">💬 Mesajlar</li>
            <li onclick="go('expert_search.html')">🩺 Uzman Ara</li>
            <li onclick="go('account_pregnant.html')">👤 Hesabım</li>
            <li onclick="logout()">🚪 Çıkış</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="top-bar">
            <h1 class="page-title">Besin Analizi</h1>

            <div class="notification-btn" onclick="toggleNotifications(event)">
                🔔
                <span class="badge"></span>

                <div id="notifDropdown" class="notif-dropdown hidden">
                    <div id="notifList"></div>
                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <!-- BESİN -->
            <div class="card">
                <h3>🍎 Besin Ekle</h3>

                <div class="input-group">
                    <input id="foodName" placeholder="Besin adı (örn: süt)">
                    <input id="foodAmount" type="number" placeholder="Miktar">

                    <select id="foodUnit">
                        <option value="tane">Tane</option>
                        <option value="tabak">Tabak</option>
                        <option value="bardak">Bardak</option>
                        <option value="fincan">Fincan</option>
                        <option value="kaşık">Kaşık</option>
                        <option value="gram">Gram</option>
                        <option value="ml">ML</option>
                        <option value="ölçek">Ölçek</option>
                    </select>

                    <button class="small-btn" onclick="addFood()">+</button>
                </div>

                <div id="foodList" class="list"></div>
            </div>

            <!-- TAKVİYE -->
            <div class="card">
                <h3>💊 Takviye Ekle</h3>

                <div class="input-group">

                    <input id="supName" placeholder="Takviye adı">

                    <input id="supAmount" type="number" placeholder="Adet">

                    <input id="supUnit" placeholder="Birim" readonly>

                    <button class="small-btn" onclick="addSupplement()">+</button>

                </div>

                <div id="supList" class="list"></div>
            </div>

        </div>

        <!-- ANALİZ BUTON -->
        <button class="analyze-btn" onclick="saveAnalysis()">
            🔍 Analiz Yap
        </button>

        <div class="result-box">

            <div class="progress-container">
                <p>Kalori</p>
                <div class="progress-bar">
                    <div id="calorieBar" class="progress-fill"></div>
                </div>
                <span id="calorieText"></span>
            </div>

            <div>
                <p>Eksik Besinler</p>
                <div id="missingList" class="badge-container"></div>
            </div>

            <div>
                <p>Fazla Besinler</p>
                <div id="excessList" class="badge-container"></div>
            </div>

        </div>

    </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="nutrition.js"></script>

<script>
    window.showResult = function(result){

      document.getElementById("calorieResult").innerText =
        result.totalCalories ?? 0;

      document.getElementById("missingList").innerText =
        result.missingNutrients?.length
          ? result.missingNutrients.join(", ")
          : "Yok";

      document.getElementById("excessList").innerText =
        result.excessNutrients?.length
          ? result.excessNutrients.join(", ")
          : "Yok";

      document.getElementById("resultModal")
        .classList.remove("hidden");
    };

    window.closeModal = function(){
      document.getElementById("resultModal")
        .classList.add("hidden");
    };
</script>

</body>
</html>
